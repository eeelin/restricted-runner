name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build linux amd64 binary
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: amd64
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" -o dist/restricted-runner-linux-amd64 ./cmd/restricted-runner
          tar -C dist -czf dist/restricted-runner-linux-amd64.tar.gz restricted-runner-linux-amd64
          sha256sum dist/restricted-runner-linux-amd64 dist/restricted-runner-linux-amd64.tar.gz > dist/sha256sums.txt

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            dist/restricted-runner-linux-amd64
            dist/restricted-runner-linux-amd64.tar.gz
            dist/sha256sums.txt
